<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Falola Family Health Portal</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;}#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}.pin-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:28px;padding:45px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.4);}.pin-logo{font-size:3.5em;margin-bottom:10px;}.pin-card h1{color:#fff;font-size:1.6em;font-weight:700;margin-bottom:6px;}.pin-card p{color:rgba(255,255,255,0.6);font-size:0.9em;margin-bottom:30px;}.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:24px;}.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.3);transition:all 0.2s;}.pin-dot.filled{background:#667eea;border-color:#667eea;box-shadow:0 0 12px rgba(102,126,234,0.7);}.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}.pin-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-size:1.4em;font-weight:600;padding:18px;cursor:pointer;transition:all 0.15s;user-select:none;}.pin-btn:active,.pin-btn:hover{background:rgba(102,126,234,0.45);border-color:#667eea;transform:scale(0.96);}.pin-error{color:#ff6b6b;font-size:0.85em;min-height:20px;margin-top:-10px;margin-bottom:10px;font-weight:600;}.pin-hint{color:rgba(255,255,255,0.35);font-size:0.78em;margin-top:12px;}#main-content{display:none;min-height:100vh;padding:20px;}.container{max-width:900px;margin:0 auto;}.top-bar{display:flex;justify-content:flex-end;margin-bottom:5px;}.lock-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);border-radius:20px;padding:6px 16px;font-size:0.78em;cursor:pointer;}.header{text-align:center;color:white;padding:20px 20px 15px;}.header h1{font-size:2em;font-weight:800;}.header p{font-size:1em;opacity:0.8;margin-top:6px;}.last-updated{font-size:0.78em;opacity:0.5;margin-top:4px;}.report-card{background:rgba(255,255,255,0.97);border-radius:22px;padding:26px;margin:15px 0;box-shadow:0 12px 40px rgba(0,0,0,0.25);}.report-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #f0f0f5;padding-bottom:15px;margin-bottom:18px;flex-wrap:wrap;gap:10px;}.report-date{font-size:1.2em;font-weight:800;color:#1a1a2e;}.nurse-badge{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:6px 15px;border-radius:20px;font-size:0.82em;font-weight:600;}.condition-banner{text-align:center;padding:13px 20px;border-radius:14px;font-size:1.05em;font-weight:700;margin-bottom:18px;}.cond-good{background:#d4edda;color:#155724;}.cond-fair{background:#fff3cd;color:#856404;}.cond-concern{background:#f8d7da;color:#721c24;}.cond-stable{background:#dde8ff;color:#2d4baa;}.sec-title{font-size:0.82em;font-weight:800;color:#667eea;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}.vcard{background:#f4f6ff;border-radius:14px;padding:14px 10px;text-align:center;border:2px solid transparent;}.vcard.alert-card{border-color:#ff4757;background:#fff5f5;}.vcard.warn-card{border-color:#ffa502;background:#fffbf0;}.vcard.good-card{border-color:#2ed573;background:#f0fff5;}.vicon{font-size:1.4em;margin-bottom:4px;}.vlabel{font-size:0.68em;color:#888;font-weight:700;text-transform:uppercase;}.vval{font-size:1.25em;font-weight:900;color:#1a1a2e;margin:2px 0;}.vunit{font-size:0.72em;color:#aaa;}.vstatus{font-size:0.68em;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px;}.s-normal{background:#d4edda;color:#155724;}.s-low{background:#cce5ff;color:#004085;}.s-high{background:#f8d7da;color:#721c24;}.s-watch{background:#fff3cd;color:#856404;}.readings-wrap{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;}.reading-block{background:#f8f9ff;border-radius:14px;padding:14px;}.reading-block h4{font-size:0.75em;color:#667eea;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}.dialysis-box{background:linear-gradient(135deg,#e0f7fa,#fce4ec);border-radius:14px;padding:16px;margin-bottom:18px;}.dialysis-box .sec-title{color:#555;}.note-box{background:#f4f6ff;border-left:4px solid #667eea;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;font-size:0.92em;color:#333;line-height:1.65;}.flag-box{background:#fff5f5;border-left:4px solid #ff4757;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;}.flag-box .sec-title{color:#ff4757;}.flag-box p{color:#555;font-size:0.9em;}.footer{text-align:center;color:rgba(255,255,255,0.4);padding:20px;font-size:0.8em;}.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.2);border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}@keyframes spin{to{transform:rotate(360deg);}}.loading{text-align:center;color:rgba(255,255,255,0.7);padding:60px 20px;}.no-data{text-align:center;padding:50px 20px;color:#888;}@media(max-width:600px){.readings-wrap{grid-template-columns:1fr;}.vitals-grid{grid-template-columns:repeat(2,1fr);}}</style></head><body><div id="pin-screen"><div class="pin-card"><div class="pin-logo">&#127973;</div><h1>Family Health Portal</h1><p>Ambassador Olanrewaju Falola</p><div class="pin-dots"><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div><div class="pin-dot" id="d4"></div></div><div class="pin-error" id="pe">&nbsp;</div><div class="pin-grid"><button class="pin-btn" onclick="pp('1')">1</button><button class="pin-btn" onclick="pp('2')">2</button><button class="pin-btn" onclick="pp('3')">3</button><button class="pin-btn" onclick="pp('4')">4</button><button class="pin-btn" onclick="pp('5')">5</button><button class="pin-btn" onclick="pp('6')">6</button><button class="pin-btn" onclick="pp('7')">7</button><button class="pin-btn" onclick="pp('8')">8</button><button class="pin-btn" onclick="pp('9')">9</button><button class="pin-btn" onclick="pd()">Del</button><button class="pin-btn" onclick="pp('0')">0</button><button class="pin-btn" onclick="pc()">Clr</button></div><div class="pin-hint">Enter your 4-digit family PIN</div></div></div><div id="mc"><div class="container"><div class="top-bar"><button class="lock-btn" onclick="lockScreen()">Lock</button></div><div class="header"><h1>&#127973; Ambassador Falola</h1><p>Daily Health Update for the Family</p><div class="last-updated" id="lu"></div></div><div id="rc"><div class="loading"><div class="spinner"></div><p>Loading health data...</p></div></div><div class="footer"><p>&#127973; Ambassador Olanrewaju Falola &mdash; Family Health Portal</p><p style="margin-top:6px">For emergencies, contact the care team directly.</p></div></div></div><script>var PIN='2025',CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQIWWR_VAieTrjboqkegpPjZP43qakEavJfFHaA-lyY5BG1vrAEeBBllehO9gAKLGosI-eIBlXUZKfg/pub?gid=142658432&single=true&output=csv',ent='';function ud(){for(var i=1;i<=4;i++)document.getElementById('d'+i).className='pin-dot'+(ent.length>=i?' filled':'');}function pp(d){if(ent.length>=4)return;ent+=d;ud();document.getElementById('pe').innerHTML='&nbsp;';if(ent.length===4)setTimeout(cp,200);}function pd(){ent=ent.slice(0,-1);ud();}function pc(){ent='';ud();document.getElementById('pe').innerHTML='&nbsp;';}function cp(){if(ent===PIN){document.getElementById('pin-screen').style.display='none';document.getElementById('mc').style.display='block';sessionStorage.setItem('a','1');loadData();}else{document.getElementById('pe').textContent='Incorrect PIN. Try again.';ent='';ud();}}function lockScreen(){sessionStorage.removeItem('a');document.getElementById('mc').style.display='none';document.getElementById('pin-screen').style.display='flex';ent='';ud();}document.addEventListener('keydown',function(e){if(document.getElementById('pin-screen').style.display!=='none'){if(e.key>='0'&&e.key<='9')pp(e.key);else if(e.key==='Backspace')pd();else if(e.key==='Escape')pc();}});if(sessionStorage.getItem('a')==='1'){document.getElementById('pin-screen').style.display='none';document.getElementById('mc').style.display='block';loadData();}function pcsv(t){var rows=[],L=t.split('\n');for(var i=0;i<L.length;i++){var line=L[i];if(!line.trim())continue;var row=[],q=false,c='';for(var j=0;j<line.length;j++){var ch=line[j];if(ch==='"'){if(q&&line[j+1]==='"'){c+='"';j++;}else q=!q;}else if(ch===','&&!q){row.push(c.trim());c='';}else c+=ch;}row.push(c.trim());rows.push(row);}return rows;}function rn(v){var n=parseFloat(v);return isNaN(n)?'':Math.round(n);}function fx(v){var n=parseFloat(v);return isNaN(n)?'':n.toFixed(1);}function nn(v){return(v&&v!=='Nil'&&v!=='Nill'&&v.trim()!=='')?v:'';}function bps(s,d){if(!s||!d)return{c:'',l:'',lc:''};s=+s;d=+d;if(s>=180||d>=120)return{c:'alert-card',l:'Very High',lc:'s-high'};if(s>=140||d>=90)return{c:'warn-card',l:'High',lc:'s-high'};if(s<90||d<60)return{c:'warn-card',l:'Low',lc:'s-low'};return{c:'good-card',l:'Normal',lc:'s-normal'};}function ops(v){if(!v)return{c:'',l:'',lc:''};v=+v;if(v<90)return{c:'alert-card',l:'Critical',lc:'s-high'};if(v<95)return{c:'warn-card',l:'Low',lc:'s-watch'};return{c:'good-card',l:'Normal',lc:'s-normal'};}function pls(v){if(!v)return{l:'',lc:''};v=+v;if(v>100)return{l:'Fast',lc:'s-high'};if(v<60)return{l:'Slow',lc:'s-low'};return{l:'Normal',lc:'s-normal'};}function tls(v){if(!v)return{l:'',lc:''};var t=parseFloat(v);if(t>=38)return{l:'Fever',lc:'s-high'};if(t<36)return{l:'Low',lc:'s-low'};return{l:'Normal',lc:'s-normal'};}function cdi(c){if(!c)return{cl:'cond-stable',e:'[stable]'};var l=c.toLowerCase();if(l.includes('good')||l.includes('stable')||l.includes('well'))return{cl:'cond-good',e:'[good]'};if(l.includes('fair')||l.includes('moderate'))return{cl:'cond-fair',e:'[fair]'};if(l.includes('poor')||l.includes('critical')||l.includes('bad'))return{cl:'cond-concern',e:'[concern]'};return{cl:'cond-stable',e:'[stable]'};}function vc(css,ic,lb,vl,un,sl,slc){return'<div class="vcard '+css+'"><div class="vicon">'+ic+'</div><div class="vlabel">'+lb+'</div><div class="vval">'+(vl||'-')+'</div><div class="vunit">'+un+'</div>'+(sl?'<span class="vstatus '+slc+'">'+sl+'</span>':'')+'</div>';}function loadData(){fetch(CSV).then(function(r){return r.text();}).then(function(t){render(pcsv(t));}).catch(function(){document.getElementById('rc').innerHTML='<div class="no-data">Could not load data. Please refresh.</div>';});}function render(rows){if(rows.length<=1){document.getElementById('rc').innerHTML='<div class="no-data">No reports yet.</div>';return;}var h='',sl=false;for(var i=rows.length-1;i>=1;i--){var r=rows[i];if(!r[1]||!r[1].trim())continue;if(!sl){document.getElementById('lu').textContent='Last updated: '+r[0];sl=true;}var s1=rn(r[10]),d1=rn(r[11]),p1=rn(r[12]),rr1=rn(r[13]),t1=fx(r[14]),o1=rn(r[15]),g1=fx(r[16]);var s2=rn(r[18]),d2=rn(r[19]),p2=rn(r[20]),rr2=rn(r[21]),t2=fx(r[22]),o2=rn(r[23]),g2=fx(r[24]);var dw=fx(r[8]),oc=r[53]||'',cm=r[54]||'',md=nn(r[52]),fl=nn(r[51]);var pdw=nn(r[5])?fx(r[5]):'',pdp=nn(r[6])?fx(r[6]):'',dt=r[4]||'',dc=nn(r[7]),uo=nn(r[25]),fi=nn(r[26]);var b1=bps(s1,d1),b2=bps(s2,d2),op1=ops(o1),op2=ops(o2),pl1=pls(p1),pl2=pls(p2),tl1=tls(t1),tl2=tls(t2),cd=cdi(oc);g1=(g1&&g1!=='0.0')?g1:'';g2=(g2&&g2!=='0.0')?g2:'';h+='<div class="report-card"><div class="report-header"><div class="report-date">Date: '+r[1]+'</div><div class="nurse-badge">Nurse: '+(r[2]||'N/A')+'</div></div>';if(oc)h+='<div class="condition-banner '+cd.cl+'">'+cd.e+' Overall: <strong>'+oc+'</strong></div>';h+='<div class="sec-title">Weight</div><div class="vitals-grid">'+vc('','W','Daily Weight',dw,'kg','','');if(dt==='Yes'){h+=vc('','Pre','Pre-Dialysis',pdw,'kg','','')+vc('','Post','Post-Dialysis',pdp,'kg','','');}h+='</div><div class="sec-title">Vital Signs</div><div class="readings-wrap"><div class="reading-block"><h4>Morning'+(r[9]?' ('+r[9]+')':'')+'</h4><div class="vitals-grid" style="grid-template-columns:repeat(2,1fr);">'+vc(b1.c,'BP','Blood Pressure',(s1&&d1?s1+'/'+d1:''),'mmHg',b1.l,b1.lc)+vc('','HR','Heart Rate',p1,'bpm',pl1.l,pl1.lc)+vc('','T','Temperature',t1,'C',tl1.l,tl1.lc)+vc(op1.c,'O2','Oxygen',o1,'%',op1.l,op1.lc)+'</div></div><div class="reading-block"><h4>Evening'+(r[17]?' ('+r[17]+')':'')+'</h4><div class="vitals-grid" style="grid-template-columns:repeat(2,1fr);">'+vc(b2.c,'BP','Blood Pressure',(s2&&d2?s2+'/'+d2:''),'mmHg',b2.l,b2.lc)+vc('','HR','Heart Rate',p2,'bpm',pl2.l,pl2.lc)+vc('','T','Temperature',t2,'C',tl2.l,tl2.lc)+vc(op2.c,'O2','Oxygen',o2,'%',op2.l,op2.lc)+'</div></div></div>';if(g1||g2||rr1||rr2||uo||fi){h+='<div class="sec-title">Other</div><div class="vitals-grid">';if(g1||g2)h+=vc('','S','Blood Sugar',(g1||g2),'mmol/L','','');if(rr1||rr2)h+=vc('','R','Breathing',(rr1||rr2),'br/min','','');if(uo)h+=vc('','U','Urine',uo,'mL','','');if(fi)h+=vc('','F','Fluids',fi,'mL','','');h+='</div>';}if(dt)h+='<div class="dialysis-box"><div class="sec-title">Dialysis</div><p style="font-size:.9em;color:#444">Dialysis today: <strong>'+dt+'</strong>'+(dc&&dc!=='No'?' &mdash; Note: '+dc:'')+'</p></div>';if(md)h+='<div class="sec-title">Medications</div><div class="note-box">'+md+'</div>';if(fl&&fl!=='None')h+='<div class="flag-box"><div class="sec-title">Notable Events</div><p>'+fl+'</p></div>';if(cm)h+='<div class="sec-title">Nurse Notes</div><div class="note-box">'+cm+'</div>';h+='</div>';}document.getElementById('rc').innerHTML=h||'<div class="no-data">No data.</div>';}</script></body></html>
