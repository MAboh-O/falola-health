<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Falola Family Health Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;}
#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
.pin-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:28px;padding:45px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.4);}
.pin-title{font-size:1.8em;font-weight:800;color:#fff;margin-bottom:6px;}
.pin-sub{color:rgba(255,255,255,0.6);font-size:0.9em;margin-bottom:30px;}
.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:24px;}
.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.3);transition:all 0.2s;}
.pin-dot.filled{background:#667eea;border-color:#667eea;box-shadow:0 0 12px rgba(102,126,234,0.7);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.pin-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-size:1.4em;font-weight:600;padding:18px;cursor:pointer;transition:all 0.15s;user-select:none;}
.pin-btn:active,.pin-btn:hover{background:rgba(102,126,234,0.45);border-color:#667eea;transform:scale(0.96);}
.pin-error{color:#ff6b6b;font-size:0.85em;min-height:20px;margin-top:-10px;margin-bottom:10px;font-weight:600;}
.pin-hint{color:rgba(255,255,255,0.35);font-size:0.78em;margin-top:12px;}
#main-content{display:none;min-height:100vh;padding:20px;}
.container{max-width:900px;margin:0 auto;}
.top-bar{display:flex;justify-content:flex-end;margin-bottom:5px;}
.lock-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);border-radius:20px;padding:6px 16px;font-size:0.78em;cursor:pointer;}
.header{text-align:center;color:white;padding:20px 20px 15px;}
.header h1{font-size:2em;font-weight:800;}
.header p{font-size:1em;opacity:0.8;margin-top:6px;}
.header-sub{font-size:0.78em;opacity:0.5;margin-top:4px;}
.section-divider{text-align:center;color:rgba(255,255,255,0.5);font-size:0.82em;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:15px 0 5px;border-top:1px solid rgba(255,255,255,0.1);margin-top:10px;}
.report-card{background:rgba(255,255,255,0.97);border-radius:22px;padding:26px;margin:15px 0;box-shadow:0 12px 40px rgba(0,0,0,0.25);}
.report-card.live-entry{border-top:4px solid #2ed573;}
.report-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #f0f0f5;padding-bottom:15px;margin-bottom:18px;flex-wrap:wrap;gap:10px;}
.report-date{font-size:1.2em;font-weight:800;color:#1a1a2e;}
.badges{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.nurse-badge{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:6px 15px;border-radius:20px;font-size:0.82em;font-weight:600;}
.shift-badge{background:rgba(102,126,234,0.15);color:#667eea;padding:4px 12px;border-radius:20px;font-size:0.75em;font-weight:600;}
.new-badge{background:#2ed573;color:#fff;padding:4px 10px;border-radius:20px;font-size:0.72em;font-weight:700;}
.condition-banner{text-align:center;padding:12px 20px;border-radius:14px;font-size:1em;font-weight:700;margin-bottom:18px;}
.cond-good{background:#d4edda;color:#155724;}
.cond-fair{background:#fff3cd;color:#856404;}
.cond-concern{background:#f8d7da;color:#721c24;}
.cond-stable{background:#dde8ff;color:#2d4baa;}
.sec-title{font-size:0.8em;font-weight:800;color:#667eea;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}
.readings-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}
.reading-block{background:#f8f9ff;border-radius:14px;padding:14px;}
.reading-block h4{font-size:0.72em;color:#667eea;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}
.vitals-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
.vcard{background:#f4f6ff;border-radius:12px;padding:12px 8px;text-align:center;border:2px solid transparent;}
.vcard.alert-card{border-color:#ff4757;background:#fff5f5;}
.vcard.warn-card{border-color:#ffa502;background:#fffbf0;}
.vcard.good-card{border-color:#2ed573;background:#f0fff5;}
.vlabel{font-size:0.65em;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:2px;}
.vval{font-size:1.2em;font-weight:900;color:#1a1a2e;}
.vunit{font-size:0.68em;color:#aaa;}
.vstatus{font-size:0.65em;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:3px;}
.s-normal{background:#d4edda;color:#155724;}
.s-low{background:#cce5ff;color:#004085;}
.s-high{background:#f8d7da;color:#721c24;}
.s-watch{background:#fff3cd;color:#856404;}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}
.icard{background:#f4f6ff;border-radius:12px;padding:12px 10px;text-align:center;}
.ilabel{font-size:0.65em;color:#888;font-weight:700;text-transform:uppercase;margin-bottom:4px;}
.ival{font-size:1em;font-weight:700;color:#1a1a2e;}
.dialysis-box{background:linear-gradient(135deg,#e0f7fa,#fce4ec);border-radius:14px;padding:14px;margin-bottom:18px;}
.note-box{background:#f4f6ff;border-left:4px solid #667eea;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;font-size:0.9em;color:#333;line-height:1.65;}
.alert-box{background:#fff8e1;border-left:4px solid #ffa502;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;}
.alert-box .sec-title{color:#e67e00;}
.alert-box p{color:#555;font-size:0.88em;margin-top:4px;}
.loading-bar{text-align:center;color:rgba(255,255,255,0.6);padding:30px;font-size:0.9em;}
.spinner{width:32px;height:32px;border:3px solid rgba(255,255,255,0.2);border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.footer{text-align:center;color:rgba(255,255,255,0.4);padding:20px;font-size:0.8em;}
@media(max-width:650px){.readings-wrap{grid-template-columns:1fr;}.info-grid{grid-template-columns:repeat(2,1fr);}}
</style>
</head>

</div>

<script>

var ent = '';
var CSV = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQIWWR_VAieTrjboqkegpPjZP43qakEavJfFHaA-lyY5BG1vrAEeBBllehO9gAKLGosI-eIBlXUZKfg/pub?gid=142658432&single=true&output=csv';

// Dates already in the hard-coded history (to avoid showing duplicates from the live feed)
var HISTORY_DATES = ['2/22/2026','2/23/2026','2/24/2026','2/25/2026','2/26/2026','2/27/2026'];

var HISTORY = [

   alerts:'',alertDetail:'',overall:'Stable',notes:'Initial report - baseline vitals recorded.'}
];

// PIN logic
function ud(){for(var i=1;i<=4;i++)document.getElementById('d'+i).className='pin-dot'+(ent.length>=i?' filled':'');}
function pp(d){if(ent.length>=4)return;ent+=d;ud();document.getElementById('pe').innerHTML='&nbsp;';if(ent.length===4)setTimeout(cp,200);}
function pd(){ent=ent.slice(0,-1);ud();}
function pc(){ent='';ud();document.getElementById('pe').innerHTML='&nbsp;';}
function cp(){if(ent===PIN){document.getElementById('pin-screen').style.display='none';document.getElementById('main-content').style.display='block';sessionStorage.setItem('fa','1');init();}else{document.getElementById('pe').textContent='Incorrect PIN. Try again.';ent='';ud();}}
function lockScreen(){sessionStorage.removeItem('fa');document.getElementById('main-content').style.display='none';document.getElementById('pin-screen').style.display='flex';ent='';ud();}
document.addEventListener('keydown',function(e){if(document.getElementById('pin-screen').style.display!=='none'){if(e.key>='0'&&e.key<='9')pp(e.key);else if(e.key==='Backspace')pd();else if(e.key==='Escape')pc();}});
if(sessionStorage.getItem('fa')==='1'){document.getElementById('pin-screen').style.display='none';document.getElementById('main-content').style.display='block';init();}

// Status helpers
function bpSt(s,d){if(!s||!d)return{c:'',l:'',lc:''};if(s>=180||d>=120)return{c:'alert-card',l:'Very High',lc:'s-high'};if(s>=140||d>=90)return{c:'warn-card',l:'High',lc:'s-high'};if(s<90||d<60)return{c:'warn-card',l:'Low',lc:'s-low'};return{c:'good-card',l:'Normal',lc:'s-normal'};}
function o2St(v){if(!v)return{c:'',l:'',lc:''};if(v<90)return{c:'alert-card',l:'Critical',lc:'s-high'};if(v<95)return{c:'warn-card',l:'Low',lc:'s-watch'};return{c:'good-card',l:'Normal',lc:'s-normal'};}
function hrSt(v){if(!v)return{l:'',lc:''};if(v>100)return{l:'High',lc:'s-high'};if(v<60)return{l:'Low',lc:'s-low'};return{l:'Normal',lc:'s-normal'};}
function tpSt(v){if(!v)return{l:'',lc:''};if(v>=38)return{l:'Fever',lc:'s-high'};if(v<36)return{l:'Low',lc:'s-low'};return{l:'Normal',lc:'s-normal'};}
function condSt(c){var l=(c||'').toLowerCase();if(l.includes('improv'))return{cl:'cond-good',tx:'Improving'};if(l.includes('stable'))return{cl:'cond-stable',tx:'Stable'};if(l.includes('good'))return{cl:'cond-good',tx:'Good'};if(l.includes('fair'))return{cl:'cond-fair',tx:'Fair'};if(l.includes('poor')||l.includes('critical'))return{cl:'cond-concern',tx:'Concern'};return{cl:'cond-stable',tx:c||'Stable'};}
function vc(css,label,val,unit,sl,slc){return'<div class="vcard '+css+'"><div class="vlabel">'+label+'</div><div class="vval">'+(val!=null&&val!==''?val:'-')+'</div><div class="vunit">'+unit+'</div>'+(sl?'<span class="vstatus '+slc+'">'+sl+'</span>':'')+'</div>';}
function ic(label,val){return'<div class="icard"><div class="ilabel">'+label+'</div><div class="ival">'+(val&&val!==''?val:'-')+'</div></div>';}
function nn(v){return(v&&v!=='Nil'&&v!=='Nill'&&v!=='nil'&&v.trim()!=='')?v:'';}
function num(v){var n=parseFloat(v);return isNaN(n)?null:n;}

// Render a single reading block from an object
function renderRO(r){
  if(!r)return'';
  var bp=bpSt(r.sbp,r.dbp),o2=o2St(r.spo2),hr=hrSt(r.hr),tp=tpSt(r.temp);
  return vc(bp.c,'Blood Pressure',(r.sbp&&r.dbp?r.sbp+'/'+r.dbp:''),'mmHg',bp.l,bp.lc)+
    vc('','Heart Rate',r.hr,'bpm',hr.l,hr.lc)+
    vc(o2.c,'SpO2',r.spo2,'%',o2.l,o2.lc)+
    (r.temp?vc('','Temperature',r.temp.toFixed(1),'&deg;C',tp.l,tp.lc):'')+
    (r.rr?vc('','Resp. Rate',r.rr,'br/min','',''):'')+
    (r.gluc?vc('','Blood Sugar',r.gluc,'mmol/L','',''):'');
}

// Render a report card from structured object (used for history)
function renderCard(rep,isLive){
  var cs=condSt(rep.overall);
  var h='<div class="report-card'+(isLive?' live-entry':'')+'"><div class="report-header"><div class="report-date">'+rep.date+'</div><div class="badges"><div class="nurse-badge">'+rep.nurse+'</div><div class="shift-badge">'+rep.shift+'</div>'+(isLive?'<div class="new-badge">NEW</div>':'')+'</div></div>';
  h+='<div class="condition-banner '+cs.cl+'">Overall Condition: <strong>'+cs.tx+'</strong></div>';
  h+='<div class="sec-title">Vital Signs</div><div class="readings-wrap">';
  if(rep.r1)h+='<div class="reading-block"><h4>Reading 1 &mdash; '+rep.r1.time+'</h4><div class="vitals-grid">'+renderRO(rep.r1)+'</div></div>';
  if(rep.r2)h+='<div class="reading-block"><h4>Reading 2 &mdash; '+rep.r2.time+'</h4><div class="vitals-grid">'+renderRO(rep.r2)+'</div></div>';
  if(rep.r3)h+='<div class="reading-block"><h4>Reading 3 &mdash; '+rep.r3.time+'</h4><div class="vitals-grid">'+renderRO(rep.r3)+'</div></div>';
  h+='</div>';
  if(rep.dialysis==='Yes')h+='<div class="dialysis-box"><div class="sec-title">Dialysis</div><p style="font-size:.9em;color:#444">Dialysis today: <strong>Yes</strong>'+(rep.dialysisNote?' &mdash; '+rep.dialysisNote:'')+'</p></div>';
  if(rep.feed&&rep.feed!=='-')h+='<div class="sec-title">Nutrition &amp; Fluids</div><div class="info-grid">'+ic('Blenderized Feed',rep.feed)+ic('Free Water',rep.water)+ic('Urine Output',rep.urine)+ic('Stool',rep.stool)+'</div>';
  if(rep.wound&&rep.wound!=='-')h+='<div class="sec-title">Wound Care</div><div class="note-box"><strong>Location:</strong> '+rep.wound+'<br><strong>Size:</strong> '+rep.wsize+' &nbsp;|&nbsp; <strong>Drainage:</strong> '+rep.wdrain+(rep.wcare?'<br><strong>Care Done:</strong> '+rep.wcare:'')+'</div>';
  if(rep.alerts)h+='<div class="alert-box"><div class="sec-title">Flagged Events</div><p><strong>Alerts:</strong> '+rep.alerts+'</p>'+(rep.alertDetail?'<p>'+rep.alertDetail+'</p>':'')+'</div>';
  if(rep.notes)h+='<div class="sec-title">Nurse Notes</div><div class="note-box">'+rep.notes+'</div>';
  h+='</div>';
  return h;
}

// Parse CSV row into a report object (columns match Form Responses 1 sheet)
// NOTE: Column 58 (Wound Photo) is intentionally NOT read or displayed
function parseRow(cols){
  return {
    date: cols[1]||'',
    nurse: cols[2]||'Nurse',
    shift: cols[3]||'24 Hour',
    dialysis: cols[4]||'No',
    dialysisNote: nn(cols[7]),
    r1: (cols[9]||cols[10]||cols[14]) ? {
      time:cols[8]||'',sbp:num(cols[9]),dbp:num(cols[10]),hr:num(cols[11]),rr:num(cols[12]),temp:num(cols[13]),spo2:num(cols[14]),gluc:num(cols[15])
    } : null,
    r2: (cols[17]||cols[18]||cols[21]) ? {
      time:cols[16]||'',sbp:num(cols[17]),dbp:num(cols[18]),hr:num(cols[19]),rr:null,temp:num(cols[20]),spo2:num(cols[21]),gluc:num(cols[22])
    } : null,
    r3: (cols[24]||cols[25]||cols[29]) ? {
      time:cols[23]||'',sbp:num(cols[24]),dbp:num(cols[25]),hr:num(cols[26]),rr:num(cols[27]),temp:num(cols[28]),spo2:num(cols[29]),gluc:num(cols[30])
    } : null,
    feed: nn(cols[35])||'-',
    water: nn(cols[36])||'-',
    urine: nn(cols[39])||'-',
    stool: nn(cols[40])||'-',
    meds: nn(cols[41])||'-',
    wound: nn(cols[45])||'-',
    wsize: (nn(cols[46])&&nn(cols[47])) ? cols[46]+'cm x '+cols[47]+'cm' : '-',
    wdrain: nn(cols[48])||'-',
    wcare: nn(cols[50])||'',
    alerts: nn(cols[51])||'',
    alertDetail: nn(cols[52])||'',
    overall: nn(cols[53])||'Stable',
    notes: nn(cols[54])||''
    // col[58] = Wound Photo - intentionally skipped
  };
}

// Parse CSV text into array of arrays
function parseCSV(text){
  var rows=[],lines=text.split('\n');
  for(var i=0;i<lines.length;i++){
    var line=lines[i],row=[],q=false,c='';
    for(var j=0;j<line.length;j++){
      var ch=line[j];
      if(ch==='"'){if(q&&line[j+1]==='"'){c+='"';j++;}else q=!q;}
      else if(ch===','&&!q){row.push(c.trim());c='';}
      else c+=ch;
    }
    row.push(c.trim());
    if(row.some(function(x){return x.trim()!=='';}))rows.push(row);
  }
  return rows;
}

// Format a raw date string like "2/28/2026" into display format
function fmtDate(d){
  try{
    var parts=d.split('/');
    var dt=new Date(parts[2],parts[0]-1,parts[1]);
    return dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  }catch(e){return d;}
}

function init(){
  // Render history immediately
  var hh='<div class="section-divider">Previous Reports (22 - 27 Feb 2026)</div>';
  for(var i=0;i<HISTORY.length;i++) hh+=renderCard(HISTORY[i],false);
  document.getElementById('history-section').innerHTML=hh;

  // Show loading for live section
  document.getElementById('live-section').innerHTML='<div class="loading-bar"><div class="spinner"></div>Checking for new reports...</div>';

  // Fetch live data
  fetch(CSV+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(text){
      var rows=parseCSV(text);
      var newRows=[];
      for(var i=rows.length-1;i>=1;i--){
        var rawDate=(rows[i][1]||'').trim();
        // Only show rows NOT already in the hard-coded history
        if(rawDate && HISTORY_DATES.indexOf(rawDate)===-1){
          var rep=parseRow(rows[i]);
          rep.date=fmtDate(rawDate);
          newRows.push(rep);
        }
      }
      var lh='';
      if(newRows.length>0){
        lh='<div class="section-divider">New Reports</div>';
        for(var j=0;j<newRows.length;j++) lh+=renderCard(newRows[j],true);
        document.getElementById('lu').textContent='Last updated: '+new Date().toLocaleString();
      } else {
        document.getElementById('lu').textContent='Records from 22 Feb 2026 - No new entries yet';
      }
      document.getElementById('live-section').innerHTML=lh;
    })
    .catch(function(){
      document.getElementById('live-section').innerHTML='';
      document.getElementById('lu').textContent='Records from 22 Feb 2026';
    });
}
</script>
