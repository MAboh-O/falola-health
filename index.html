<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Falola Family Health Portal</title><style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);min-height:100vh;}#pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}.pin-card{background:rgba(255,255,255,0.08);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.15);border-radius:28px;padding:45px 40px;max-width:400px;width:100%;text-align:center;box-shadow:0 25px 60px rgba(0,0,0,0.4);}.pin-logo{font-size:3.5em;margin-bottom:10px;}.pin-card h1{color:#fff;font-size:1.6em;font-weight:700;margin-bottom:6px;}.pin-card p{color:rgba(255,255,255,0.6);font-size:0.9em;margin-bottom:30px;}.pin-dots{display:flex;justify-content:center;gap:14px;margin-bottom:24px;}.pin-dot{width:16px;height:16px;border-radius:50%;background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.3);transition:all 0.2s;}.pin-dot.filled{background:#667eea;border-color:#667eea;box-shadow:0 0 12px rgba(102,126,234,0.7);}.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}.pin-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);border-radius:16px;color:#fff;font-size:1.4em;font-weight:600;padding:18px;cursor:pointer;transition:all 0.15s;user-select:none;}.pin-btn:active,.pin-btn:hover{background:rgba(102,126,234,0.45);border-color:#667eea;transform:scale(0.96);}.pin-error{color:#ff6b6b;font-size:0.85em;min-height:20px;margin-top:-10px;margin-bottom:10px;font-weight:600;}.pin-hint{color:rgba(255,255,255,0.35);font-size:0.78em;margin-top:12px;}#main-content{display:none;min-height:100vh;padding:20px;}.container{max-width:900px;margin:0 auto;}.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}.lock-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);color:rgba(255,255,255,0.7);border-radius:20px;padding:6px 16px;font-size:0.78em;cursor:pointer;}.trend-toggle{background:rgba(102,126,234,0.3);border:1px solid rgba(102,126,234,0.5);color:rgba(255,255,255,0.9);border-radius:20px;padding:6px 16px;font-size:0.78em;cursor:pointer;}.header{text-align:center;color:white;padding:20px 20px 15px;}.header h1{font-size:2em;font-weight:800;}.header p{font-size:1em;opacity:0.8;margin-top:6px;}.last-updated{font-size:0.78em;opacity:0.5;margin-top:4px;}.section-divider{text-align:center;color:rgba(255,255,255,0.5);font-size:0.82em;font-weight:700;text-transform:uppercase;letter-spacing:2px;padding:15px 0 5px;}.report-card{background:rgba(255,255,255,0.97);border-radius:22px;padding:26px;margin:15px 0;box-shadow:0 12px 40px rgba(0,0,0,0.25);}.report-card.historical{opacity:0.92;}.report-header{display:flex;justify-content:space-between;align-items:center;border-bottom:2px solid #f0f0f5;padding-bottom:15px;margin-bottom:18px;flex-wrap:wrap;gap:10px;}.report-date{font-size:1.2em;font-weight:800;color:#1a1a2e;}.nurse-badge{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:6px 15px;border-radius:20px;font-size:0.82em;font-weight:600;}.day-badge{background:rgba(102,126,234,0.15);color:#667eea;padding:4px 12px;border-radius:20px;font-size:0.75em;font-weight:600;}.condition-banner{text-align:center;padding:13px 20px;border-radius:14px;font-size:1.05em;font-weight:700;margin-bottom:18px;}.cond-good{background:#d4edda;color:#155724;}.cond-fair{background:#fff3cd;color:#856404;}.cond-concern{background:#f8d7da;color:#721c24;}.cond-stable{background:#dde8ff;color:#2d4baa;}.sec-title{font-size:0.82em;font-weight:800;color:#667eea;text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;}.vitals-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:18px;}.vcard{background:#f4f6ff;border-radius:14px;padding:14px 10px;text-align:center;border:2px solid transparent;}.vcard.alert-card{border-color:#ff4757;background:#fff5f5;}.vcard.warn-card{border-color:#ffa502;background:#fffbf0;}.vcard.good-card{border-color:#2ed573;background:#f0fff5;}.vicon{font-size:1.4em;margin-bottom:4px;}.vlabel{font-size:0.68em;color:#888;font-weight:700;text-transform:uppercase;}.vval{font-size:1.25em;font-weight:900;color:#1a1a2e;margin:2px 0;}.vunit{font-size:0.72em;color:#aaa;}.vstatus{font-size:0.68em;font-weight:700;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px;}.s-normal{background:#d4edda;color:#155724;}.s-low{background:#cce5ff;color:#004085;}.s-high{background:#f8d7da;color:#721c24;}.s-watch{background:#fff3cd;color:#856404;}.readings-wrap{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:18px;}.reading-block{background:#f8f9ff;border-radius:14px;padding:14px;}.reading-block h4{font-size:0.75em;color:#667eea;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;}.dialysis-box{background:linear-gradient(135deg,#e0f7fa,#fce4ec);border-radius:14px;padding:16px;margin-bottom:18px;}.dialysis-box .sec-title{color:#555;}.note-box{background:#f4f6ff;border-left:4px solid #667eea;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;font-size:0.92em;color:#333;line-height:1.65;}.flag-box{background:#fff5f5;border-left:4px solid #ff4757;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;}.flag-box .sec-title{color:#ff4757;}.flag-box p{color:#555;font-size:0.9em;}.alert-box{background:#fff8e1;border-left:4px solid #ffa502;border-radius:0 12px 12px 0;padding:14px;margin-bottom:14px;}.alert-box .sec-title{color:#e67e00;}.footer{text-align:center;color:rgba(255,255,255,0.4);padding:20px;font-size:0.8em;}.spinner{width:40px;height:40px;border:4px solid rgba(255,255,255,0.2);border-top-color:#667eea;border-radius:50%;animation:spin 0.8s linear infinite;margin:20px auto;}@keyframes spin{to{transform:rotate(360deg);}}.loading{text-align:center;color:rgba(255,255,255,0.7);padding:60px 20px;}.no-data{text-align:center;padding:50px 20px;color:#888;}@media(max-width:600px){.readings-wrap{grid-template-columns:1fr;}.vitals-grid{grid-template-columns:repeat(2,1fr);}}</style></head><body><div id="pin-screen"><div class="pin-card"><div class="pin-logo">&#127973;</div><h1>Family Health Portal</h1><p>Ambassador Olanrewaju Falola</p><div class="pin-dots"><div class="pin-dot" id="d1"></div><div class="pin-dot" id="d2"></div><div class="pin-dot" id="d3"></div><div class="pin-dot" id="d4"></div></div><div class="pin-error" id="pe">&nbsp;</div><div class="pin-grid"><button class="pin-btn" onclick="pp('1')">1</button><button class="pin-btn" onclick="pp('2')">2</button><button class="pin-btn" onclick="pp('3')">3</button><button class="pin-btn" onclick="pp('4')">4</button><button class="pin-btn" onclick="pp('5')">5</button><button class="pin-btn" onclick="pp('6')">6</button><button class="pin-btn" onclick="pp('7')">7</button><button class="pin-btn" onclick="pp('8')">8</button><button class="pin-btn" onclick="pp('9')">9</button><button class="pin-btn" onclick="pd()">Del</button><button class="pin-btn" onclick="pp('0')">0</button><button class="pin-btn" onclick="pc()">Clr</button></div><div class="pin-hint">Enter your 4-digit family PIN</div></div></div><div id="main-content"><div class="container"><div class="top-bar"><div></div><button class="lock-btn" onclick="lockScreen()">&#128274; Lock</button></div><div class="header"><h1>&#127973; Ambassador Falola</h1><p>Daily Health Updates — Family Portal</p><div class="last-updated" id="lu">Records from 22 Feb 2026 · Updated regularly</div></div><div id="rc"></div><div class="footer"><p>&#127973; Ambassador Olanrewaju Falola &mdash; Family Health Portal</p><p style="margin-top:6px">For emergencies, contact the care team directly.</p></div></div></div>

    overall: "Improving",
    notes: "Patient receiving minimal feeding & water through the mouth, partially movement from the extremities and partial verbalisation."
  },
  {

    nurse: "Nurse Pius",

    dialysis: "No",
    dialysisNote: "",
    readings: [
      {time:"6:00am", sbp:174, dbp:78, pulse:95, rr:18, temp:37.2, spo2:99, glucose:4.3},
      {time:"10:02am", sbp:122, dbp:57, pulse:89, rr:null, temp:36.7, spo2:89, glucose:null},

function ud(){for(var i=1;i<=4;i++)document.getElementById('d'+i).className='pin-dot'+(ent.length>=i?' filled':'');}
function pp(d){if(ent.length>=4)return;ent+=d;ud();document.getElementById('pe').innerHTML='&nbsp;';if(ent.length===4)setTimeout(cp,200);}
function pd(){ent=ent.slice(0,-1);ud();}
function pc(){ent='';ud();document.getElementById('pe').innerHTML='&nbsp;';}
function cp(){if(ent===PIN){document.getElementById('pin-screen').style.display='none';document.getElementById('main-content').style.display='block';sessionStorage.setItem('a','1');renderAll();}else{document.getElementById('pe').textContent='Incorrect PIN. Try again.';ent='';ud();}}
function lockScreen(){sessionStorage.removeItem('a');document.getElementById('main-content').style.display='none';document.getElementById('pin-screen').style.display='flex';ent='';ud();}
document.addEventListener('keydown',function(e){if(document.getElementById('pin-screen').style.display!=='none'){if(e.key>='0'&&e.key<='9')pp(e.key);else if(e.key==='Backspace')pd();else if(e.key==='Escape')pc();}});
if(sessionStorage.getItem('a')==='1'){document.getElementById('pin-screen').style.display='none';document.getElementById('main-content').style.display='block';renderAll();}

function bpStatus(s,d){if(!s||!d)return{c:'',l:'',lc:''};if(s>=180||d>=120)return{c:'alert-card',l:'Very High',lc:'s-high'};if(s>=140||d>=90)return{c:'warn-card',l:'High',lc:'s-high'};if(s<90||d<60)return{c:'warn-card',l:'Low',lc:'s-low'};return{c:'good-card',l:'Normal',lc:'s-normal'};}
function o2Status(v){if(!v)return{c:'',l:'',lc:''};if(v<90)return{c:'alert-card',l:'Critical',lc:'s-high'};if(v<95)return{c:'warn-card',l:'Low',lc:'s-watch'};return{c:'good-card',l:'Normal',lc:'s-normal'};}
function pulseStatus(v){if(!v)return{l:'',lc:''};if(v>100)return{l:'High',lc:'s-high'};if(v<60)return{l:'Low',lc:'s-low'};return{l:'Normal',lc:'s-normal'};}
function tempStatus(v){if(!v)return{l:'',lc:''};if(v>=38)return{l:'Fever',lc:'s-high'};if(v<36)return{l:'Low',lc:'s-low'};return{l:'Normal',lc:'s-normal'};}
function condInfo(c){if(!c)return{cl:'cond-stable',e:'⚖️'};var l=c.toLowerCase();if(l.includes('improv'))return{cl:'cond-good',e:'↗️'};if(l.includes('good')||l.includes('stable')||l.includes('well'))return{cl:'cond-good',e:'✅'};if(l.includes('fair')||l.includes('moderate'))return{cl:'cond-fair',e:'⚠️'};if(l.includes('poor')||l.includes('critical'))return{cl:'cond-concern',e:'🚨'};return{cl:'cond-stable',e:'⚖️'};}
function vcard(css,icon,label,val,unit,sl,slc){return'<div class="vcard '+css+'"><div class="vicon">'+icon+'</div><div class="vlabel">'+label+'</div><div class="vval">'+(val!==null&&val!==undefined&&val!==''?val:'-')+'</div><div class="vunit">'+unit+'</div>'+(sl?'<span class="vstatus '+slc+'">'+sl+'</span>':'')+'</div>';}

function renderReading(r){
  if(!r)return'';
  var bp=bpStatus(r.sbp,r.dbp),op=o2Status(r.spo2),pl=pulseStatus(r.pulse),tl=tempStatus(r.temp);
  var bpVal=r.sbp&&r.dbp?r.sbp+'/'+r.dbp:'';
  return vcard(bp.c,'❤️','Blood Pressure',bpVal,'mmHg',bp.l,bp.lc)+
    vcard('','💗','Pulse',r.pulse,'bpm',pl.l,pl.lc)+
    vcard(op.c,'🌬️','SpO2',r.spo2,'%',op.l,op.lc)+
    (r.temp?vcard('','🌡️','Temp',r.temp.toFixed(1),'°C',tl.l,tl.lc):'')+
    (r.rr?vcard('','🌫️','Resp Rate',r.rr,'br/min','',''): '')+
    (r.glucose?vcard('','🩸','Blood Sugar',r.glucose,'mmol/L','',''):'');
}

function renderReport(rep, idx){
  var cd=condInfo(rep.overall);
  var h='<div class="report-card'+(idx>0?' historical':'')+'"><div class="report-header"><div class="report-date">'+rep.date+'</div><div style="display:flex;gap:8px;align-items:center;"><div class="nurse-badge">'+rep.nurse+'</div><div class="day-badge">'+rep.shift+'</div></div></div>';
  if(rep.overall)h+='<div class="condition-banner '+cd.cl+'">'+cd.e+' Overall Condition: <strong>'+rep.overall+'</strong></div>';
  
  // Readings
  var r0=rep.readings[0], r1=rep.readings[1], r2=rep.readings[2];
  h+='<div class="sec-title">&#128200; Vital Signs</div><div class="readings-wrap">';
  if(r0){h+='<div class="reading-block"><h4>Reading 1'+(r0.time?' &mdash; '+r0.time:'')+'</h4><div class="vitals-grid" style="grid-template-columns:repeat(2,1fr);">'+renderReading(r0)+'</div></div>';}
  if(r1){h+='<div class="reading-block"><h4>Reading 2'+(r1.time?' &mdash; '+r1.time:'')+'</h4><div class="vitals-grid" style="grid-template-columns:repeat(2,1fr);">'+renderReading(r1)+'</div></div>';}
  if(r2){h+='<div class="reading-block"><h4>Reading 3'+(r2.time?' &mdash; '+r2.time:'')+'</h4><div class="vitals-grid" style="grid-template-columns:repeat(2,1fr);">'+renderReading(r2)+'</div></div>';}
  h+='</div>';
  
  // Dialysis
  if(rep.dialysis==='Yes'){h+='<div class="dialysis-box"><div class="sec-title">&#128139; Dialysis</div><p style="font-size:.9em;color:#444">Dialysis today: <strong>Yes</strong>'+(rep.dialysisNote?' &mdash; Note: '+rep.dialysisNote:'')+'</p></div>';}
  
  // Nutrition
  if(rep.feeding&&rep.feeding!=='-'){h+='<div class="sec-title">&#127829; Nutrition & Fluids</div><div class="vitals-grid">'+vcard('','🥣','Blenderized Feed',rep.feeding,'','','')+vcard('','💧','Free Water',rep.freeWater,'','','')+vcard('','🚿','Urine Output',rep.urine,'','','')+vcard('','','Stool',rep.stool,'','','')+'</div>';}
  
  // Wound
  if(rep.woundLocation&&rep.woundLocation!=='-'){h+='<div class="sec-title">&#129657; Wound Care</div><div class="note-box"><strong>Location:</strong> '+rep.woundLocation+'<br><strong>Size:</strong> '+rep.woundSize+' &nbsp;|&nbsp; <strong>Drainage:</strong> '+rep.woundDrainage+(rep.woundCare?'<br><strong>Care Done:</strong> '+rep.woundCare:'')+'</div>';}
  
  // Alerts
  if(rep.alerts){h+='<div class="alert-box"><div class="sec-title">&#9888;&#65039; Flagged Events</div><p style="color:#555;font-size:.9em;"><strong>Alerts:</strong> '+rep.alerts+'</p>'+(rep.alertDetail?'<p style="color:#555;font-size:.9em;margin-top:6px;">'+rep.alertDetail+'</p>':'')+'</div>';}
  
  // Nurse notes
  if(rep.notes){h+='<div class="sec-title">&#128203; Nurse Notes</div><div class="note-box">'+rep.notes+'</div>';}
  
  h+='</div>';
  return h;
}

function renderAll(){
  var h='';
  for(var i=0;i<STATIC_REPORTS.length;i++){
    if(i===0) h+='<div class="section-divider">&#128313; Latest Report</div>';
    else if(i===1) h+='<div class="section-divider">&#128199; Previous Reports</div>';
    h+=renderReport(STATIC_REPORTS[i], i);
  }
  document.getElementById('rc').innerHTML=h;
}
</script></body></html>
