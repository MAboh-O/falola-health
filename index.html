<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Falola Family Health Portal</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1a1a2e;min-height:100vh}
.pin-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460)}
.pin-box{background:white;border-radius:20px;padding:40px;text-align:center;width:320px;box-shadow:0 20px 60px rgba(0,0,0,0.3)}
.pin-logo{font-size:48px;margin-bottom:16px;color:#0f3460;font-weight:700}
.pin-title{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:6px}
.pin-sub{font-size:13px;color:#6c757d;margin-bottom:24px}
.pin-display{background:#f8f9fa;border-radius:12px;padding:16px;margin-bottom:20px;letter-spacing:12px;font-size:28px;font-weight:700;color:#1a1a2e;min-height:64px;display:flex;align-items:center;justify-content:center}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
.pin-btn{background:#f8f9fa;border:2px solid #e9ecef;border-radius:10px;padding:16px;font-size:20px;font-weight:600;cursor:pointer;transition:all 0.15s}
.pin-btn:hover{background:#e9ecef;border-color:#adb5bd}
.pin-btn:active{transform:scale(0.95)}
.pin-btn-wide{grid-column:span 3}
.pin-hint{font-size:12px;color:#adb5bd;margin-top:8px}
.container{max-width:1000px;margin:0 auto;padding:20px}
.top-bar{background:linear-gradient(135deg,#1a1a2e,#0f3460);color:white;border-radius:16px;padding:20px 24px;margin-bottom:20px}
.top-bar h1{font-size:20px;font-weight:700}
.top-bar p{font-size:13px;opacity:0.8;margin-top:4px}
.refresh-bar{background:white;border-radius:12px;padding:14px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.refresh-info{font-size:13px;color:#6c757d}
.refresh-btn{background:#0f3460;color:white;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.refresh-btn:hover{background:#1a1a2e}
.refresh-btn:disabled{background:#adb5bd;cursor:not-allowed}
.section-title{font-size:16px;font-weight:700;color:#1a1a2e;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid #e9ecef}
.new-badge{background:#28a745;color:white;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
.report-card{background:white;border-radius:16px;padding:20px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
.report-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.report-date{font-size:18px;font-weight:700;color:#1a1a2e}
.nurse-badge{background:#0f3460;color:white;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600}
.shift-badge{background:#e9ecef;color:#495057;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600}
.condition-box{border-radius:12px;padding:14px 20px;margin-bottom:16px;font-size:15px;font-weight:600;text-align:center}
.condition-improving{background:#d4edda;color:#155724}
.condition-stable{background:#fff3cd;color:#856404}
.condition-declining{background:#f8d7da;color:#721c24}
.section-header{font-size:12px;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:1px;margin:16px 0 10px}
.vitals-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.vital-card{border-radius:10px;padding:12px;text-align:center;border:2px solid #e9ecef}
.vital-card.red-bdr{border-color:#dc3545;background:#fff5f5}
.vital-card.grn-bdr{border-color:#28a745;background:#f0fff4}
.vital-card.ylw-bdr{border-color:#ffc107;background:#fffdf0}
.vital-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#6c757d;margin-bottom:4px}
.vital-value{font-size:20px;font-weight:700;color:#1a1a2e}
.vital-unit{font-size:11px;color:#adb5bd}
.vital-status{display:inline-block;border-radius:10px;padding:2px 8px;font-size:10px;font-weight:700;margin-top:4px}
.s-normal,.s-elevated{background:#d4edda;color:#155724}
.s-high,.s-high-stage-1,.s-low-fever{background:#fff3cd;color:#856404}
.s-very-high,.s-critical,.s-low,.s-fever{background:#f8d7da;color:#721c24}
.reading-hdr{font-size:12px;font-weight:700;color:#0f3460;text-transform:uppercase;letter-spacing:1px;margin:12px 0 8px;padding:6px 10px;background:#e8eef7;border-radius:6px}
.detail-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:10px}
.detail-item{background:#f8f9fa;border-radius:8px;padding:10px 14px}
.detail-label{font-size:11px;color:#6c757d;font-weight:600;text-transform:uppercase;margin-bottom:2px}
.detail-value{font-size:14px;color:#1a1a2e;font-weight:600}
.comments-box{background:#f8f9fa;border-radius:10px;padding:14px;margin-top:8px}
.comments-text{font-size:14px;color:#1a1a2e;line-height:1.5}
.footer{text-align:center;padding:20px;color:#adb5bd;font-size:12px;margin-top:10px}
@media(max-width:600px){.vitals-grid{grid-template-columns:repeat(2,1fr)}.detail-grid{grid-template-columns:1fr}.refresh-bar{flex-direction:column;gap:10px;align-items:flex-start}}
</style>
</head>
<body>
<div id="pin-screen" class="pin-screen">
  <div class="pin-box">
    <div class="pin-logo">+</div>
    <div class="pin-title">Falola Health Portal</div>
    <div class="pin-sub">Family Access Only</div>
    <div class="pin-display" id="pin-display">----</div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pp('1')">1</button>
      <button class="pin-btn" onclick="pp('2')">2</button>
      <button class="pin-btn" onclick="pp('3')">3</button>
      <button class="pin-btn" onclick="pp('4')">4</button>
      <button class="pin-btn" onclick="pp('5')">5</button>
      <button class="pin-btn" onclick="pp('6')">6</button>
      <button class="pin-btn" onclick="pp('7')">7</button>
      <button class="pin-btn" onclick="pp('8')">8</button>
      <button class="pin-btn" onclick="pp('9')">9</button>
      <button class="pin-btn" onclick="pp('0')">0</button>
      <button class="pin-btn pin-btn-wide" onclick="pc()">Clr</button>
    </div>
    <div class="pin-hint">Enter your 4-digit family PIN</div>
  </div>
</div>
<div id="main-content" style="display:none">
  <div class="container">
    <div class="top-bar">
      <h1>Ambassador Olanrewaju Falola</h1>
      <p>Daily Nursing Report - Family Health Portal</p>
    </div>
    <div class="refresh-bar">
      <div class="refresh-info" id="refresh-status">Click the button to check for new reports</div>
      <button class="refresh-btn" id="refresh-btn" onclick="fetchLive()">Check for New Reports</button>
    </div>
    <div id="live-section"></div>
    <div id="history-section"></div>
    <div class="footer">
      <p>Ambassador Olanrewaju Falola &mdash; Family Health Portal</p>
      <p style="margin-top:6px">For emergencies, contact the care team directly.</p>
    </div>
  </div>
</div>
<script>
var PIN='0226';
var CSV='https://docs.google.com/spreadsheets/d/e/2PACX-1vQIWWR_VAieTrjboqkegpPjZP43qakEavJfFHaA-lyY5BG1vrAEeBBllehO9gAKLGosI-eIBlXUZKfg/pub?gid=142658432&single=true&output=csv';
var HDATES=['2/22/2026','2/23/2026','2/24/2026','2/25/2026','2/26/2026','2/27/2026','2/28/2026'];
var ent='';
function pp(d){if(ent.length<4){ent+=d;ud();}}
function pc(){ent='';ud();}
function ud(){
  var s=ent.padEnd(4,'-').split('').map(function(c){return c==='-'?'-':'*';}).join(' ');
  document.getElementById('pin-display').textContent=s;
  if(ent.length===4){
    if(ent===PIN){
      document.getElementById('pin-screen').style.display='none';
      document.getElementById('main-content').style.display='block';
      ent='';
      renderHistory();
    } else {
      document.getElementById('pin-display').textContent='Wrong PIN';
      setTimeout(function(){ent='';ud();},1200);
    }
  }
}
document.addEventListener('keydown',function(e){
  if(document.getElementById('pin-screen').style.display!=='none'){
    if(e.key>='0'&&e.key<='9')pp(e.key);
    else if(e.key==='Backspace'||e.key==='Delete'||e.key==='Escape')pc();
  }
});
function parseCSV(text){
  var lines=[];var cur='';var inq=false;
  for(var i=0;i<text.length;i++){
    var c=text[i];
    if(c==='"'){inq=!inq;}
    else if(c.charCodeAt(0)===10&&!inq){lines.push(cur);cur='';}
    else if(c.charCodeAt(0)!==13){cur+=c;}
  }
  if(cur)lines.push(cur);
  return lines.map(function(line){
    var fields=[];var f='';var iq=false;
    for(var i=0;i<line.length;i++){
      var ch=line[i];
      if(ch==='"'){iq=!iq;}
      else if(ch===','&&!iq){fields.push(f.trim());f='';}
      else{f+=ch;}
    }
    fields.push(f.trim());
    return fields;
  });
}
function bpC(s){var v=parseInt(s)||0;return v<120?'grn-bdr':v<140?'ylw-bdr':'red-bdr';}
function bpS(s){var v=parseInt(s)||0;if(v<120)return 'Normal';if(v<130)return 'Elevated';if(v<140)return 'High Stage 1';if(v<180)return 'High';return 'Very High';}
function puC(p){var v=parseInt(p)||0;return(v>=60&&v<=100)?'grn-bdr':(v>=50&&v<=110)?'ylw-bdr':'red-bdr';}
function puS(p){var v=parseInt(p)||0;if(v>=60&&v<=100)return 'Normal';if(v>100)return 'High';return 'Low';}
function spC(s){var v=parseInt(s)||0;return v>=95?'grn-bdr':v>=90?'ylw-bdr':'red-bdr';}
function spS(s){var v=parseInt(s)||0;if(v>=95)return 'Normal';if(v>=90)return 'Low';return 'Critical';}
function tpC(t){var v=parseFloat(t)||0;return(v>=36.1&&v<=37.2)?'grn-bdr':(v>=37.3&&v<=38.0)?'ylw-bdr':'red-bdr';}
function tpS(t){var v=parseFloat(t)||0;if(v>=36.1&&v<=37.2)return 'Normal';if(v>=37.3&&v<=38.0)return 'Low Fever';if(v>38.0)return 'Fever';return 'Low';}
function cC(c){var l=(c||'').toLowerCase();if(l.indexOf('improv')>=0)return 'condition-improving';if(l.indexOf('declin')>=0)return 'condition-declining';return 'condition-stable';}
function smartParse(r){
  var cv=['Improving','Stable','Declining'];
  var ci=-1;
  for(var j=r.length-1;j>=50;j--){if(cv.indexOf(r[j])>=0){ci=j;break;}}
  var wt=r[r.length-2]||'';
  var cmts=ci>=0?r.slice(ci+1,r.length-2).join(' ').trim():'';
  return {
    date:r[1]||'',nurse:r[2]||'',shift:r[3]||'',dialysis:r[4]||'',
    preDW:r[5]||'',postDW:r[6]||'',
    r1time:r[8]||'',r1sbp:r[9]||'',r1dbp:r[10]||'',r1pulse:r[11]||'',r1rr:r[12]||'',r1temp:r[13]||'',r1spo2:r[14]||'',r1glucose:r[15]||'',
    r2time:r[16]||'',r2sbp:r[17]||'',r2dbp:r[18]||'',r2pulse:r[19]||'',r2temp:r[20]||'',r2spo2:r[21]||'',r2glucose:r[22]||'',
    r3time:r[23]||'',r3sbp:r[24]||'',r3dbp:r[25]||'',r3pulse:r[26]||'',r3rr:r[27]||'',r3temp:r[28]||'',r3spo2:r[29]||'',r3glucose:r[30]||'',
    urine:r[39]||'',stool:r[40]||'',
    condition:ci>=0?r[ci]:'',comments:cmts,
    dailyWeight:(wt&&wt!='0')?wt:''
  };
}
function rdgHTML(lbl,sbp,dbp,pulse,rr,temp,spo2,glucose){
  if(!sbp&&!pulse&&!spo2)return '';
  var h='<div class="reading-hdr">'+lbl+'</div><div class="vitals-grid">';
  h+='<div class="vital-card '+bpC(sbp)+'"><div class="vital-label">BLOOD PRESSURE</div><div class="vital-value">'+(sbp&&dbp?parseFloat(sbp).toFixed(0)+'/'+parseFloat(dbp).toFixed(0):'--')+'</div><div class="vital-unit">mmHg</div><span class="vital-status s-'+bpS(sbp).toLowerCase().replace(/ /g,'-')+'">'+bpS(sbp)+'</span></div>';
  h+='<div class="vital-card '+puC(pulse)+'"><div class="vital-label">PULSE</div><div class="vital-value">'+(pulse?parseFloat(pulse).toFixed(0):'--')+'</div><div class="vital-unit">bpm</div><span class="vital-status s-'+puS(pulse).toLowerCase()+'">'+puS(pulse)+'</span></div>';
  h+='<div class="vital-card '+spC(spo2)+'"><div class="vital-label">SPO2</div><div class="vital-value">'+(spo2?parseFloat(spo2).toFixed(0):'--')+'</div><div class="vital-unit">%</div><span class="vital-status s-'+spS(spo2).toLowerCase()+'">'+spS(spo2)+'</span></div>';
  h+='<div class="vital-card '+tpC(temp)+'"><div class="vital-label">TEMP</div><div class="vital-value">'+(temp||'--')+'</div><div class="vital-unit">Celsius</div><span class="vital-status s-'+tpS(temp).toLowerCase().replace(/ /g,'-')+'">'+tpS(temp)+'</span></div>';
  if(rr)h+='<div class="vital-card"><div class="vital-label">RESP RATE</div><div class="vital-value">'+parseFloat(rr).toFixed(0)+'</div><div class="vital-unit">br/min</div></div>';
  if(glucose&&glucose!='Nil')h+='<div class="vital-card"><div class="vital-label">BLOOD SUGAR</div><div class="vital-value">'+glucose+'</div><div class="vital-unit">mmol/L</div></div>';
  h+='</div>';
  return h;
}
function buildCard(d,isNew){
  var h='<div class="report-card">';
  h+='<div class="report-header">';
  var ds=d.date;
  try{var dt=new Date(d.date);if(!isNaN(dt))ds=dt.toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});}catch(e){}
  h+='<div class="report-date">'+ds+(isNew?'<span class="new-badge">NEW</span>':'')+'</div>';
  h+='<div style="display:flex;gap:8px"><span class="nurse-badge">'+d.nurse+'</span><span class="shift-badge">'+d.shift+'</span></div>';
  h+='</div>';
  if(d.condition)h+='<div class="condition-box '+cC(d.condition)+'">Overall Condition: '+d.condition+'</div>';
  h+='<div class="section-header">Vital Signs</div>';
  h+=rdgHTML('Reading 1 - '+d.r1time,d.r1sbp,d.r1dbp,d.r1pulse,d.r1rr,d.r1temp,d.r1spo2,d.r1glucose);
  h+=rdgHTML('Reading 2 - '+d.r2time,d.r2sbp,d.r2dbp,d.r2pulse,'',d.r2temp,d.r2spo2,d.r2glucose);
  h+=rdgHTML('Reading 3 - '+d.r3time,d.r3sbp,d.r3dbp,d.r3pulse,d.r3rr,d.r3temp,d.r3spo2,d.r3glucose);
  if(d.dailyWeight){h+='<div class="section-header">Daily Weight</div><div class="detail-grid"><div class="detail-item"><div class="detail-label">Weight</div><div class="detail-value">'+d.dailyWeight+' kg</div></div></div>';}
  if(d.dialysis==='Yes'&&(d.preDW||d.postDW)){
    h+='<div class="section-header">Dialysis Weights</div><div class="detail-grid">';
    if(d.preDW&&d.preDW.toLowerCase()!=='nil')h+='<div class="detail-item"><div class="detail-label">Pre-Dialysis</div><div class="detail-value">'+d.preDW+' kg</div></div>';
    if(d.postDW&&d.postDW.toLowerCase()!=='nil')h+='<div class="detail-item"><div class="detail-label">Post-Dialysis</div><div class="detail-value">'+d.postDW+' kg</div></div>';
    h+='</div>';
  }
  if(d.urine||d.stool){
    h+='<div class="section-header">Output</div><div class="detail-grid">';
    if(d.urine)h+='<div class="detail-item"><div class="detail-label">Urine</div><div class="detail-value">'+d.urine+'</div></div>';
    if(d.stool)h+='<div class="detail-item"><div class="detail-label">Stool</div><div class="detail-value">'+d.stool+'</div></div>';
    h+='</div>';
  }
  if(d.comments){h+='<div class="section-header">Nurse Notes</div><div class="comments-box"><div class="comments-text">'+d.comments+'</div></div>';}
  h+='</div>';
  return h;
}
function fetchLive(){
  var btn=document.getElementById('refresh-btn');
  var st=document.getElementById('refresh-status');
  btn.disabled=true;btn.textContent='Checking...';
  st.textContent='Fetching latest data from Google Sheets...';
  fetch(CSV+'&t='+Date.now())
    .then(function(r){return r.text();})
    .then(function(text){
      var rows=parseCSV(text);
      var newRows=[];
      for(var i=rows.length-1;i>=1;i--){
        var rd=(rows[i][1]||'').trim();
        if(rd&&HDATES.indexOf(rd)<0)newRows.push(rows[i]);
      }
      var ld=document.getElementById('live-section');
      if(newRows.length>0){
        var hh='<div class="section-title">New Reports <span class="new-badge">'+newRows.length+'</span></div>';
        newRows.forEach(function(row){hh+=buildCard(smartParse(row),true);});
        ld.innerHTML=hh;
      } else {
        ld.innerHTML='<div class="report-card" style="text-align:center;color:#6c757d;padding:30px">No new entries since 28 February 2026</div>';
      }
      var now=new Date();
      var ts=now.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      st.textContent='Last checked: '+ts+' -- '+(newRows.length>0?newRows.length+' new report(s)':'No new reports');
      btn.disabled=false;btn.textContent='Refresh Again';
    })
    .catch(function(){
      st.textContent='Could not fetch data. Check connection and try again.';
      btn.disabled=false;btn.textContent='Try Again';
    });
}
function renderHistory(){
  document.getElementById('history-section').innerHTML='<div class="section-title" style="margin-top:20px">Previous Reports (22 - 28 Feb 2026)</div>'+histCards();
